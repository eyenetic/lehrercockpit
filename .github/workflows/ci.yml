name: CI

on:
  push:
  pull_request:

jobs:
  # ── Job A: fast path — always runs, no database needed ─────────────────────
  test:
    name: Test (no DB)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Python syntax check
        run: |
          find backend/ -name "*.py" | xargs python3 -m py_compile
          python3 -m py_compile app.py server.py

      - name: Run non-DB tests
        run: pytest tests/ -v --tb=short -m "not db"

  # ── Job B: DB integration — spins up a real PostgreSQL service ─────────────
  test-db:
    name: Test (with DB)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: lehrercockpit_test
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://testuser:testpass@localhost:5432/lehrercockpit_test
      TEST_DATABASE_URL: postgresql://testuser:testpass@localhost:5432/lehrercockpit_test
      FLASK_SECRET_KEY: ci-test-secret-key-not-for-production
      ENCRYPTION_KEY: ""

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate test encryption key
        run: |
          python3 -c "from cryptography.fernet import Fernet; print('ENCRYPTION_KEY=' + Fernet.generate_key().decode())" >> $GITHUB_ENV

      - name: Run DB tests only
        run: pytest tests/ -v --tb=short -m "db"
