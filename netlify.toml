[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/data/*"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/styles.css"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/src/*"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "no-store"
